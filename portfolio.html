<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude Eisensaurier — Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <a href="index.html" class="logo">CE</a>
    <ul>
      <li><a href="index.html" data-de="Start" data-en="Home">Start</a></li>
      <li><a href="about.html" data-de="Über mich" data-en="About">Über mich</a></li>
      <li><a href="portfolio.html" class="active" data-de="Portfolio" data-en="Portfolio">Portfolio</a></li>
      <li><a href="contact.html" data-de="Kontakt" data-en="Contact">Kontakt</a></li>
    </ul>
    <button class="lang-toggle" onclick="toggleLang()">EN</button>
  </nav>

  <section class="page-header">
    <div class="page-header-inner">
      <p class="page-label" data-de="Meine Fotografien" data-en="My Photographs">Meine Fotografien</p>
      <h1 data-de="Portfolio." data-en="Portfolio.">Portfolio.</h1>
    </div>
    <div class="page-header-line"></div>
  </section>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="alle" data-de="Alle" data-en="All">Alle</button>
    <button class="filter-btn" data-filter="menschen" data-de="Menschen" data-en="People">Menschen</button>
    <button class="filter-btn" data-filter="urban" data-de="Urban" data-en="Urban">Urban</button>
    <button class="filter-btn" data-filter="natur" data-de="Natur" data-en="Nature">Natur</button>
  </div>

  <!-- Grid is filled by JavaScript -->
  <section class="portfolio-grid" id="portfolioGrid"></section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-prev" onclick="event.stopPropagation(); changePhoto(-1)">‹</button>
    <button class="lb-next" onclick="event.stopPropagation(); changePhoto(1)">›</button>
    <div class="lb-inner" onclick="event.stopPropagation()">
      <img id="lbImg" src="" alt="" />
      <div class="lb-caption">
        <span id="lbTitle"></span>
        <span id="lbCat"></span>
      </div>
    </div>
  </div>

  <div class="portfolio-note" id="portfolioNote" style="display:none">
    <p data-de="Keine Fotos in dieser Kategorie gefunden." data-en="No photos found in this category.">Keine Fotos in dieser Kategorie gefunden.</p>
  </div>

  <footer>
    <span class="footer-logo">Claude Eisensaurier</span>
    <span data-de="© 2025 Alle Rechte vorbehalten" data-en="© 2025 All rights reserved">© 2025 Alle Rechte vorbehalten</span>
  </footer>

  <script src="lang.js"></script>
  <script>
    // ============================================================
    //  PORTFOLIO — Liest Bilder aus photos.json
    //  Füge neue Fotos einfach in den richtigen Ordner ein und
    //  trage sie in photos.json ein.
    // ============================================================

    let allPhotos = [];
    let visiblePhotos = [];
    let currentIndex = 0;

    // Kategorie-Labels für die Lightbox
    const catLabels = {
      de: { menschen: 'Menschen', urban: 'Urban', natur: 'Natur' },
      en: { menschen: 'People', urban: 'Urban', natur: 'Nature' }
    };

    async function loadPhotos() {
      try {
        const res = await fetch('photos.json');
        allPhotos = await res.json();
      } catch (e) {
        // Fallback: Beispiel-Platzhalter wenn noch keine photos.json vorhanden
        allPhotos = [
          { file: 'fotos/menschen/beispiel1.jpeg', titel_de: 'Beispiel Portrait', titel_en: 'Example Portrait', kategorie: 'menschen' },
          { file: 'fotos/urban/beispiel2.jpeg', titel_de: 'Beispiel Urban', titel_en: 'Example Urban', kategorie: 'urban' },
          { file: 'fotos/natur/beispiel3.jpeg', titel_de: 'Beispiel Natur', titel_en: 'Example Nature', kategorie: 'natur' }
        ];
      }
      renderGrid('alle');
      applyFilterFromURL();
    }

    function applyFilterFromURL() {
      const params = new URLSearchParams(window.location.search);
      const f = params.get('filter');
      if (f) {
        setFilter(f);
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.filter === f);
        });
      }
    }

    function renderGrid(filter) {
      const grid = document.getElementById('portfolioGrid');
      const note = document.getElementById('portfolioNote');
      const lang = document.documentElement.lang || 'de';

      visiblePhotos = filter === 'alle'
        ? allPhotos
        : allPhotos.filter(p => p.kategorie === filter);

      grid.innerHTML = '';

      if (visiblePhotos.length === 0) {
        note.style.display = 'block';
        return;
      }
      note.style.display = 'none';

      visiblePhotos.forEach((photo, idx) => {
        const titel = lang === 'de' ? photo.titel_de : photo.titel_en;
        const div = document.createElement('div');
        div.className = 'portfolio-item';
        // Every 5th item is large
        if ((idx + 1) % 5 === 0) div.classList.add('large');

        div.innerHTML = `
          <div class="pi-img">
            <img src="${photo.file}" alt="${titel}" loading="lazy" onerror="this.parentElement.parentElement.classList.add('img-missing')" />
            <div class="pi-hover">
              <span data-de="Vergrössern" data-en="View">Vergrössern</span>
            </div>
          </div>
          <div class="pi-info">
            <h4>${titel}</h4>
            <span>${catLabels[lang][photo.kategorie] || photo.kategorie}</span>
          </div>
        `;
        div.querySelector('.pi-img').addEventListener('click', () => openLightbox(idx));
        grid.appendChild(div);
      });
    }

    function setFilter(filter) {
      renderGrid(filter);
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        setFilter(btn.dataset.filter);
      });
    });

    // Lightbox
    function openLightbox(idx) {
      currentIndex = idx;
      showPhoto(idx);
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPhoto(idx) {
      const lang = document.documentElement.lang || 'de';
      const photo = visiblePhotos[idx];
      document.getElementById('lbImg').src = photo.file;
      document.getElementById('lbImg').alt = lang === 'de' ? photo.titel_de : photo.titel_en;
      document.getElementById('lbTitle').textContent = lang === 'de' ? photo.titel_de : photo.titel_en;
      document.getElementById('lbCat').textContent = catLabels[lang][photo.kategorie] || photo.kategorie;
    }

    function changePhoto(dir) {
      currentIndex = (currentIndex + dir + visiblePhotos.length) % visiblePhotos.length;
      showPhoto(currentIndex);
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowRight') changePhoto(1);
      if (e.key === 'ArrowLeft') changePhoto(-1);
      if (e.key === 'Escape') closeLightbox();
    });

    loadPhotos();
  </script>
</body>
</html>
